name: CI

on:
  pull_request:
    branches: [main]
jobs:
  check:
    name: Typecheck and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm i

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint